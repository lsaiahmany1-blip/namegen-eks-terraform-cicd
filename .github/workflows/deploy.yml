name: Build and Deploy NameGen

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: namegen
  TF_WORKING_DIR: terraform
  K8S_MANIFEST_DIR: kubernetes
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'namegen/project3/terraform.tfstate' }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'namegen-terraform-locks' }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Terraform, Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve

      - name: Read Terraform outputs
        id: tf
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY_URL: ${{ steps.tf.outputs.ecr_repository_url }}
        run: |
          docker build -t "$ECR_REPOSITORY_URL:$IMAGE_TAG" .
          docker push "$ECR_REPOSITORY_URL:$IMAGE_TAG"

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name "${{ steps.tf.outputs.cluster_name }}" --region "${{ env.AWS_REGION }}"

      - name: Deploy Kubernetes manifests
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY_URL: ${{ steps.tf.outputs.ecr_repository_url }}
        run: |
          kubectl apply -k "$K8S_MANIFEST_DIR"
          kubectl -n namegen set image deployment/namegen namegen="$ECR_REPOSITORY_URL:$IMAGE_TAG"

      - name: Validate Kubernetes deployment
        run: |
          kubectl -n namegen rollout status deployment/namegen --timeout=300s

          echo "Pods in namespace namegen:"
          kubectl -n namegen get pods -o wide

          echo "Services in namespace namegen:"
          kubectl -n namegen get services -o wide

          echo "PVCs in namespace namegen:"
          kubectl -n namegen get pvc

          echo "Recent events in namespace namegen:"
          kubectl -n namegen get events --sort-by=.lastTimestamp

          echo "NameGen LoadBalancer hostname/address:"
          kubectl -n namegen get service namegen -o jsonpath='{.status.loadBalancer.ingress[0].hostname}{"\n"}{.status.loadBalancer.ingress[0].ip}{"\n"}'
