name: Build and Deploy NameGen

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: namegen
  TF_WORKING_DIR: terraform
  K8S_MANIFEST_DIR: kubernetes
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET || 'namegen-terraform-state-452670588645' }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'namegen/dev/terraform.tfstate' }}
  TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'terraform-locks' }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Terraform, Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Bootstrap Terraform remote state
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "$TF_STATE_BUCKET" 2>/dev/null; then
            echo "Terraform state bucket already exists: $TF_STATE_BUCKET"
          else
            echo "Creating Terraform state bucket: $TF_STATE_BUCKET"
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$TF_STATE_BUCKET"
            else
              aws s3api create-bucket \
                --bucket "$TF_STATE_BUCKET" \
                --create-bucket-configuration LocationConstraint="$AWS_REGION"
            fi
          fi

          aws s3api wait bucket-exists --bucket "$TF_STATE_BUCKET"

          aws s3api put-bucket-versioning \
            --bucket "$TF_STATE_BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$TF_STATE_BUCKET" \
            --server-side-encryption-configuration '{
              "Rules": [
                {
                  "ApplyServerSideEncryptionByDefault": {
                    "SSEAlgorithm": "AES256"
                  }
                }
              ]
            }'

          aws s3api put-public-access-block \
            --bucket "$TF_STATE_BUCKET" \
            --public-access-block-configuration '{
              "BlockPublicAcls": true,
              "IgnorePublicAcls": true,
              "BlockPublicPolicy": true,
              "RestrictPublicBuckets": true
            }'

          if aws dynamodb describe-table --table-name "$TF_LOCK_TABLE" >/dev/null 2>&1; then
            echo "Terraform lock table already exists: $TF_LOCK_TABLE"
          else
            echo "Creating Terraform lock table: $TF_LOCK_TABLE"
            aws dynamodb create-table \
              --table-name "$TF_LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
          fi

          aws dynamodb wait table-exists --table-name "$TF_LOCK_TABLE"
          echo "Terraform remote state backend is ready."

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve

      - name: Read Terraform outputs
        id: tf
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "cluster_name=$(terraform output -raw cluster_name)" >> "$GITHUB_OUTPUT"
          echo "ecr_repository_url=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY_URL: ${{ steps.tf.outputs.ecr_repository_url }}
        run: |
          docker build -t "$ECR_REPOSITORY_URL:$IMAGE_TAG" .
          docker push "$ECR_REPOSITORY_URL:$IMAGE_TAG"

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name "${{ steps.tf.outputs.cluster_name }}" --region "${{ env.AWS_REGION }}"

      - name: Recreate MongoDB StatefulSet storage if needed
        run: |
          set -euo pipefail

          desired_storage_class="gp3"
          desired_provisioner="ebs.csi.eks.amazonaws.com"
          desired_storage="5Gi"
          recreate_storage="false"
          recreate_storage_class="false"

          kubectl apply -f "$K8S_MANIFEST_DIR/namespace.yaml"

          current_provisioner="$(kubectl get storageclass "$desired_storage_class" -o jsonpath='{.provisioner}' 2>/dev/null || true)"
          if [ -n "$current_provisioner" ] && [ "$current_provisioner" != "$desired_provisioner" ]; then
            echo "StorageClass $desired_storage_class provisioner is $current_provisioner, expected $desired_provisioner."
            recreate_storage="true"
            recreate_storage_class="true"
          fi

          if kubectl -n namegen get statefulset mongodb >/dev/null 2>&1; then
            current_sts_storage_class="$(kubectl -n namegen get statefulset mongodb -o jsonpath='{.spec.volumeClaimTemplates[0].spec.storageClassName}' 2>/dev/null || true)"
            current_sts_storage="$(kubectl -n namegen get statefulset mongodb -o jsonpath='{.spec.volumeClaimTemplates[0].spec.resources.requests.storage}' 2>/dev/null || true)"
            if [ "$current_sts_storage_class" != "$desired_storage_class" ]; then
              echo "StatefulSet storageClassName is '${current_sts_storage_class:-<empty>}', expected $desired_storage_class."
              recreate_storage="true"
            fi
            if [ "$current_sts_storage" != "$desired_storage" ]; then
              echo "StatefulSet storage request is '${current_sts_storage:-<empty>}', expected $desired_storage."
              recreate_storage="true"
            fi
          fi

          if kubectl -n namegen get pvc mongodb-data-mongodb-0 >/dev/null 2>&1; then
            current_pvc_storage_class="$(kubectl -n namegen get pvc mongodb-data-mongodb-0 -o jsonpath='{.spec.storageClassName}' 2>/dev/null || true)"
            if [ "$current_pvc_storage_class" != "$desired_storage_class" ]; then
              echo "PVC storageClassName is '${current_pvc_storage_class:-<empty>}', expected $desired_storage_class."
              recreate_storage="true"
            fi
          fi

          if [ "$recreate_storage" = "true" ]; then
            echo "Recreating MongoDB StatefulSet storage because immutable storage settings changed."

            kubectl -n namegen delete statefulset mongodb --ignore-not-found=true
            kubectl -n namegen wait --for=delete pod/mongodb-0 --timeout=180s || true

            for pvc in $(kubectl -n namegen get pvc -o name | grep '^persistentvolumeclaim/mongodb-data-mongodb-' || true); do
              kubectl -n namegen delete "$pvc"
            done

            for attempt in {1..30}; do
              if ! kubectl -n namegen get pvc -o name | grep -q '^persistentvolumeclaim/mongodb-data-mongodb-'; then
                break
              fi

              if [ "$attempt" -eq 30 ]; then
                echo "Timed out waiting for MongoDB PVC deletion."
                kubectl -n namegen get pvc
                exit 1
              fi

              sleep 5
            done
          else
            echo "MongoDB storage settings already match the desired configuration."
          fi

          if [ "$recreate_storage_class" = "true" ]; then
            kubectl delete storageclass "$desired_storage_class" --ignore-not-found=true
          fi

      - name: Deploy Kubernetes manifests
        env:
          IMAGE_TAG: ${{ github.sha }}
          ECR_REPOSITORY_URL: ${{ steps.tf.outputs.ecr_repository_url }}
        run: |
          kubectl apply -k "$K8S_MANIFEST_DIR"
          kubectl -n namegen set image deployment/namegen namegen="$ECR_REPOSITORY_URL:$IMAGE_TAG"

      - name: Validate Kubernetes deployment
        run: |
          set -euo pipefail

          for attempt in {1..60}; do
            pvc_phase="$(kubectl -n namegen get pvc mongodb-data-mongodb-0 -o jsonpath='{.status.phase}' 2>/dev/null || true)"
            if [ "$pvc_phase" = "Bound" ]; then
              echo "MongoDB PVC is Bound."
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "MongoDB PVC did not become Bound."
              kubectl -n namegen describe pvc mongodb-data-mongodb-0 || true
              kubectl -n namegen get events --sort-by=.lastTimestamp
              exit 1
            fi

            sleep 10
          done

          kubectl -n namegen rollout status statefulset/mongodb --timeout=600s
          kubectl -n namegen wait --for=condition=Ready pod/mongodb-0 --timeout=600s
          kubectl -n namegen rollout status deployment/namegen --timeout=300s

          running_namegen_pods="$(kubectl -n namegen get pods -l app=namegen --field-selector=status.phase=Running --no-headers 2>/dev/null | wc -l | tr -d ' ')"
          if [ "$running_namegen_pods" -lt 2 ]; then
            echo "Expected at least 2 Running NameGen pods, found $running_namegen_pods."
            kubectl -n namegen get pods -o wide
            exit 1
          fi

          for attempt in {1..60}; do
            load_balancer_hostname="$(kubectl -n namegen get service namegen -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)"
            if [ -n "$load_balancer_hostname" ]; then
              echo "NameGen LoadBalancer hostname: $load_balancer_hostname"
              break
            fi

            if [ "$attempt" -eq 60 ]; then
              echo "LoadBalancer hostname is empty."
              kubectl -n namegen describe service namegen || true
              kubectl -n namegen get events --sort-by=.lastTimestamp
              exit 1
            fi

            sleep 10
          done

          echo "Final pods in namespace namegen:"
          kubectl -n namegen get pods -o wide

          echo "Final PVCs in namespace namegen:"
          kubectl -n namegen get pvc

          echo "Final services in namespace namegen:"
          kubectl -n namegen get svc -o wide

          echo "StorageClass gp3:"
          kubectl get storageclass gp3 -o yaml

          echo "Recent events in namespace namegen:"
          kubectl -n namegen get events --sort-by=.lastTimestamp

          echo "NameGen LoadBalancer hostname/address:"
          kubectl -n namegen get service namegen -o jsonpath='{.status.loadBalancer.ingress[0].hostname}{"\n"}{.status.loadBalancer.ingress[0].ip}{"\n"}'
