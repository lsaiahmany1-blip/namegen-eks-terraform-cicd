apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-init
  namespace: namegen
data:
  01-create-namegen-user.js: |
    db = db.getSiblingDB('namegen');
    db.createUser({
      user: 'genuser',
      pwd: 'password',
      roles: [
        {
          role: 'readWrite',
          db: 'namegen'
        }
      ]
    });
