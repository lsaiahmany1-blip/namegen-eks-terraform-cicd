apiVersion: apps/v1
kind: Deployment
metadata:
  name: namegen
  namespace: namegen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: namegen
  template:
    metadata:
      labels:
        app: namegen
    spec:
      containers:
        - name: namegen
          image: namegen:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: MONGODB_URL
              value: mongodb://genuser:password@mongodb/namegen
